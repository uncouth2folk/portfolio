<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Samiul Tasab Sakhawat</title>
    <style>
        body {
            background: #0a0a0f;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
            text-align: center;
        }
        h1 {
            font-size: 100px;
            background: linear-gradient(135deg, #ff1744, #00e5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        a {
            color: #00e5ff;
            text-decoration: none;
            font-size: 20px;
            border: 1px solid #00e5ff;
            padding: 10px 30px;
            border-radius: 30px;
        }
        a:hover {
            background: rgba(0, 229, 255, 0.1);
        }
    </style>
</head>
<body>
    <div>
        <h1>404</h1>
        <p>Page Not Found</p>
        <br>
        <a href="/">GO HOME</a>
    </div>
</body>
</html>
